spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=8080
spring.application.name=nomi

# Google Gemini API Configuration
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
#spring.ai.google.genai.project-id=nomi-local-bypass
#spring.ai.google.genai.location=global
# Chat Configuration
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite
# Embedding Configuration
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001

# Custom Properties for NOMI Ingestion
nomi.data.source-path=classpath:docs/resume-portfolio.md

# Enable active tool resolution routines inside the client engine
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.type=SYNC

# =========================================================================
# Configuration 1: Zapier MCP Integration (Migrated to Streamable HTTP Transport)
# =========================================================================
# Point directly to Zapier's new Streamable HTTP /mcp specification endpoint
spring.ai.mcp.client.connections.zapier-http-mcp.transport=http
spring.ai.mcp.client.connections.zapier-http-mcp.http.url=https://mcp.zapier.com/api/v1/connect?token=${ZAPIER_MCP_KEY}

# Actuator configuration
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=NOMI
info.app.description=NOMI: A portfolio chatbot that changes my professional journey into an interactive, conversational experience.
info.app.version=1.0.0
info.app.owner=Aman Saxena
